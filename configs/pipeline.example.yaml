dataset:
  image_root: "data/images"
  label_root: "data/labels"
  projection: "equirectangular"
  image_width: 2048
  image_height: 1024

rotation:
  edge_samples_per_side: 24
  rotations:
    - name: "yaw_30"
      yaw_deg: 30
      pitch_deg: 0
      roll_deg: 0
    - name: "pitch_15_roll_10"
      yaw_deg: 0
      pitch_deg: 15
      roll_deg: 10

labels:
  output_polygon: true
  output_obb: true
  output_aabb: true
  angle_period: "pi"

tracker:
  type: "byte-style-obb"
  high_score_threshold: 0.5
  low_score_threshold: 0.1
  new_track_threshold: 0.6
  match_threshold: 0.7
  second_match_threshold: 0.5
  max_age: 30
  min_hits: 1
  use_depth: false
  use_flow: false
  weights:
    center: 0.1
    depth: 0.0
    angle: 0.05

evaluation:
  aabb_metrics: true
  oriented_metrics: true
  oriented_iou_threshold: 0.5

